<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWP 빠른 열기</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      width: 360px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    .container { padding: 14px; }
    h1 { margin: 0 0 10px; font-size: 15px; }
    .drop-zone {
      border: 2px dashed #94a3b8;
      border-radius: 10px;
      background: #fff;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      transition: border-color .15s, background .15s;
    }
    .drop-zone.dragover {
      border-color: #2563eb;
      background: #dbeafe;
    }
    .drop-note { font-size: 12px; color: #64748b; line-height: 1.5; }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      flex: 1;
    }
    button.secondary { background: #475569; }
    #status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: #334155;
    }
    #status.error { color: #b91c1c; }
    .recent-wrap {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }
    .recent-title {
      font-size: 12px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .recent-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      max-height: 130px;
      overflow: auto;
    }
    .recent-item {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 8px;
      display: grid;
      gap: 5px;
    }
    .recent-name {
      font-size: 12px;
      color: #1e293b;
      word-break: break-all;
      line-height: 1.35;
    }
    .recent-meta {
      font-size: 11px;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .recent-open {
      border: 0;
      border-radius: 6px;
      background: #334155;
      color: #fff;
      padding: 4px 6px;
      font-size: 11px;
      cursor: pointer;
      flex: none;
    }
    .recent-empty {
      font-size: 12px;
      color: #64748b;
      margin: 0;
    }
    .recent-note {
      margin: 8px 0 0;
      font-size: 11px;
      color: #64748b;
      line-height: 1.4;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 HWP 뷰어 & 에디터</h1>
    <div class="drop-zone" id="dropZone">
      <div class="drop-note">
        .hwp / .hwpx 파일을 드래그 앤 드롭하세요.<br />
        또는 아래 버튼으로 파일을 선택하세요.
      </div>
    </div>
    <div class="actions">
      <button id="btnSelectFile">파일 선택</button>
      <button id="btnOpenViewer" class="secondary">뷰어만 열기</button>
    </div>
    <p id="status"></p>
    <section class="recent-wrap">
      <div class="recent-title">최근 파일</div>
      <ul class="recent-list" id="recentList"></ul>
      <p class="recent-empty" id="recentEmpty">아직 기록된 파일이 없습니다.</p>
      <p class="recent-note">링크로 연 문서는 여기서 다시 열 수 있습니다. 로컬 업로드 기록은 이름만 표시됩니다.</p>
    </section>
    <input id="fileInput" type="file" accept=".hwp,.hwpx" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
