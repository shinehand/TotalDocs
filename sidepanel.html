<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWP 파일 목록</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .section {
      margin-bottom: 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .section-title {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0;
    }
    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 220px;
      overflow: auto;
    }
    li {
      border-bottom: 1px solid #f1f5f9;
    }
    li:last-child { border-bottom: 0; }
    button.link {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      color: #1e293b;
    }
    button.link:hover { background: #eff6ff; }
    .muted {
      padding: 8px 10px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h2>📚 HWP 파일 목록</h2>

  <section class="section">
    <div class="section-title">최근 열기</div>
    <ul id="recentList"></ul>
  </section>

  <section class="section">
    <div class="section-title">현재 페이지의 HWP 링크</div>
    <ul id="linkList"></ul>
  </section>

  <script src="sidepanel.js"></script>
</body>
</html>
