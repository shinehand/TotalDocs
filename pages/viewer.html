<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWP Web Viewer &amp; Editor</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/icon32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../icons/icon16.png" />
  <link rel="apple-touch-icon" href="../icons/icon128.png" />
  <link href="../lib/quill.snow.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/viewer.css" />
  <link rel="stylesheet" href="../css/editor.css" />

  <script>
  // ── 한글 웹폰트 프리로드 (rhwp editor.html 방식) ──────────────────────────
  // HWP 문서에서 자주 사용되는 폰트를 미리 로드
  // Canvas measureTextWidth의 정확도를 높이고 렌더링 품질을 개선한다.
  (function() {
    const CDN_HAMCHOB_R = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2104@1.0/HANBatang.woff';
    const CDN_HAMCHOB_B = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2104@1.0/HANBatangB.woff';
    const CDN_HAMCHOD_R = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.0/HCRDotum.woff';

    const fonts = [
      // 함초롬/한컴 폰트 (CDN)
      { name: '함초롬돋움',  file: CDN_HAMCHOD_R, format: 'woff' },
      { name: '함초롬바탕',  file: CDN_HAMCHOB_R, format: 'woff' },
      { name: '함초롱돋움',  file: CDN_HAMCHOD_R, format: 'woff' },
      { name: '함초롱바탕',  file: CDN_HAMCHOB_R, format: 'woff' },
      { name: '한컴돋움',    file: CDN_HAMCHOD_R, format: 'woff' },
      { name: '한컴바탕',    file: CDN_HAMCHOB_R, format: 'woff' },
      { name: '새돋움',      file: CDN_HAMCHOD_R, format: 'woff' },
      { name: '새바탕',      file: CDN_HAMCHOB_R, format: 'woff' },
      // HY 폰트 → Noto 대체
      { name: 'HY헤드라인M',      file: '../lib/fonts/NotoSansKR-Bold.woff2' },
      { name: 'HYHeadLine M',     file: '../lib/fonts/NotoSansKR-Bold.woff2' },
      { name: 'HYHeadLine Medium',file: '../lib/fonts/NotoSansKR-Bold.woff2' },
      { name: 'HY견고딕',         file: '../lib/fonts/NotoSansKR-Bold.woff2' },
      { name: 'HYGothic-Extra',   file: '../lib/fonts/NotoSansKR-Bold.woff2' },
      { name: 'HY그래픽',         file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: 'HYGraphic-Medium', file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: 'HY그래픽M',        file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: 'HY견명조',         file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: 'HYMyeongJo-Extra', file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: 'HY신명조',         file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: 'HY중고딕',         file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      // 시스템 폰트 대체
      { name: 'Malgun Gothic', file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '맑은 고딕',     file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '돋움',          file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '돋움체',        file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '굴림',          file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '바탕',          file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: '바탕체',        file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: '궁서',          file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: '궁서체',        file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: '나눔고딕',      file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: '나눔명조',      file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
      { name: 'Noto Sans KR',  file: '../lib/fonts/NotoSansKR-Regular.woff2' },
      { name: 'Noto Serif KR', file: '../lib/fonts/NotoSerifKR-Regular.woff2' },
    ];

    // 1) CSS @font-face 규칙 생성 (Canvas 2D 호환)
    const style = document.createElement('style');
    style.textContent = fonts.map(f => {
      const fmt = f.format || 'woff2';
      return `@font-face { font-family: "${f.name}"; src: url("${f.file}") format("${fmt}"); font-display: block; }`;
    }).join('\n');
    document.head.appendChild(style);

    // 2) FontFace API로 폰트 데이터를 즉시 로드 (네트워크 요청 트리거)
    let loadedCount = 0, failedCount = 0;
    globalThis._fontLoadPromise = Promise.all(fonts.map(f => {
      const fmt = f.format || 'woff2';
      const face = new FontFace(f.name, `url(${f.file}) format('${fmt}')`);
      return face.load().then(loadedFace => {
        document.fonts.add(loadedFace);
        loadedCount++;
        return loadedFace;
      }).catch(e => {
        failedCount++;
        return null;
      });
    })).then(async () => {
      await document.fonts.ready;
      console.log(`[폰트] ${loadedCount}개 로드 완료, ${failedCount}개 실패`);
    });
  })();

  // ── measureTextWidth LRU 캐시 (WASM용) ─────────────────────────────────────
  // rhwp-wasm-renderer.js와 중복 방지: 여기서 먼저 정의하면 모듈 로드 전에도 동작
  (function() {
    if (typeof globalThis.measureTextWidth !== 'undefined') return;
    let ctx = null, lastFont = '';
    const cache = new Map();
    const MAX = 256, EVICT = 64;
    globalThis.measureTextWidth = function(font, text) {
      const key = font + '\0' + text;
      if (cache.has(key)) {
        const v = cache.get(key); cache.delete(key); cache.set(key, v); return v;
      }
      if (!ctx) ctx = document.createElement('canvas').getContext('2d');
      if (font !== lastFont) { ctx.font = font; lastFont = font; }
      const w = ctx.measureText(text).width;
      if (cache.size >= MAX) {
        const iter = cache.keys();
        for (let i = 0; i < EVICT; i++) { const k = iter.next().value; if (k) cache.delete(k); }
      }
      cache.set(key, w);
      return w;
    };
  })();
  </script>
</head>
<body>

<!-- ───────────── 헤더 툴바 ───────────── -->
<header class="app-header">
  <div class="header-left">
    <span class="app-logo">📄</span>
    <span class="app-title">HWP Web Viewer &amp; Editor</span>
    <span class="file-name" id="fileName">파일을 업로드하세요</span>
  </div>
  <div class="header-right">
    <button id="btnOpenFile"  class="btn btn-primary">📂 파일 열기</button>
    <button id="btnEditMode"  class="btn btn-secondary" disabled>✏️ 편집 모드</button>
    <!-- style="display:none" 사용 — hidden 속성은 CSS display:flex에 의해 무시됨 -->
    <button id="btnViewMode"  class="btn btn-secondary" style="display:none">👁️ 보기 모드</button>
    <div class="export-group" id="exportGroup" style="display:none">
      <button id="btnSaveCurrent" class="btn btn-export" disabled>💾 저장</button>
      <select id="saveAsFormat" class="save-format-select" aria-label="다른 이름으로 저장 형식">
        <option value="hwpx">HWPX</option>
        <option value="owpml">OWPML</option>
        <option value="html">HTML</option>
        <option value="pdf">PDF</option>
        <option value="hwp">HWP</option>
      </select>
      <button id="btnSaveAs" class="btn btn-export" disabled>🗂️ 다른 이름으로 저장</button>
      <button id="btnPrint" class="btn btn-export" disabled>🖨️ 인쇄</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".hwp,.hwpx,.owpml" style="display:none" />
</header>

<!-- ───────────── WASM 뷰어 보조 툴바 (줌 + 검색) ───────────── -->
<div class="wasm-toolbar hidden" id="wasmToolbar">
  <div class="wasm-toolbar-group">
    <button class="wasm-tb-btn" id="btnZoomOut" title="축소 (Ctrl+-)">&#8722;</button>
    <span class="wasm-zoom-level" id="zoomLevel">100%</span>
    <button class="wasm-tb-btn" id="btnZoomIn"  title="확대 (Ctrl++)">&#43;</button>
    <button class="wasm-tb-btn" id="btnZoomFit" title="페이지 너비에 맞춤">맞춤</button>
  </div>
  <div class="wasm-toolbar-group wasm-search-group">
    <input type="text" class="wasm-search-input" id="wasmSearchInput" placeholder="검색 (Ctrl+F)…" />
    <button class="wasm-tb-btn" id="btnSearchPrev" disabled title="이전 결과">&#9650;</button>
    <button class="wasm-tb-btn" id="btnSearchNext" disabled title="다음 결과">&#9660;</button>
    <span class="wasm-search-info hidden" id="wasmSearchInfo">0 / 0</span>
    <button class="wasm-tb-btn wasm-search-clear hidden" id="btnSearchClear" title="검색 초기화">&#10005;</button>
  </div>
</div>

<!-- ───────────── 드래그&드롭 업로드 존 ───────────── -->
<div class="drop-zone" id="dropZone">
  <div class="drop-zone-inner">
    <div class="drop-icon">📂</div>
    <p class="drop-title">HWP / HWPX / OWPML 파일을 여기에 끌어다 놓으세요</p>
    <p class="drop-sub">또는 <button class="link-btn" id="btnDropOpen">파일 선택</button></p>
    <p class="drop-note">지원 형식: .hwp (HWP 5.0+), .hwpx, .owpml</p>
  </div>
</div>

<!-- ───────────── 로딩 오버레이 (초기 숨김) ───────────── -->
<!-- display:none 인라인 스타일 사용 — CSS .loading-overlay{display:flex}에 의해 hidden 속성이 무시되는 문제 방지 -->
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <p id="loadingMsg">처리 중...</p>
</div>

<!-- ───────────── 오류 배너 ───────────── -->
<div class="error-banner" id="errorBanner" style="display:none">
  <span id="errorMsg"></span>
  <button class="close-btn" id="btnCloseError">✕</button>
</div>

<!-- ───────────── 메인 콘텐츠 영역 ───────────── -->
<main class="main-content" id="mainContent" style="display:none">

  <!-- 페이지 탐색 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">페이지</div>
    <div class="page-thumbnails" id="pageThumbnails"></div>
  </aside>

  <!-- 뷰어 패널 -->
  <section class="viewer-panel" id="viewerPanel">
    <div class="document-canvas" id="documentCanvas"></div>
  </section>

  <!-- 편집기 패널 -->
  <section class="editor-panel" id="editorPanel" style="display:none">
    <div class="editor-toolbar-info">
      ℹ️ 편집 모드: 아래 에디터에서 텍스트와 서식을 수정한 뒤 저장하거나 다른 이름으로 저장하세요.
    </div>
    <div id="quillEditor"></div>
  </section>

</main>

<!-- ───────────── 상태바 ───────────── -->
<footer class="status-bar" id="statusBar" style="display:none">
  <span id="statusPageInfo">1 / 1 페이지</span>
  <span id="statusFileInfo"></span>
  <span id="statusMode" class="mode-badge view">보기 모드</span>
</footer>

<script src="../lib/quill.min.js"></script>
<script src="../lib/jszip.min.js"></script>
<script src="../lib/pako.min.js"></script>
<!-- 폰트 치환 모듈 (전역 FontSubstitution 객체 등록) -->
<script src="../js/font_substitution.js"></script>
<!-- rhwp WASM 렌더러 (ES module) — app.js보다 먼저 선언, 초기화는 비동기 -->
<script type="module" src="../js/rhwp-wasm-renderer.js"></script>
<script src="../js/hwp-parser.js"></script>
<script src="../js/hwp-renderer.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
