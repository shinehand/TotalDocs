      { name: 'D2Coding', file: '../lib/fonts/D2Coding-Bold.woff2', weight: 700 },
      { name: '해피니스 산스 레귤러', file: '../lib/fonts/Happiness-Sans-Regular.woff2' },
      { name: 'Happiness Sans Regular', file: '../lib/fonts/Happiness-Sans-Regular.woff2' },

      { name: '해피니스 산스 타이틀', file: '../lib/fonts/Happiness-Sans-Title.woff2' },
      { name: 'Happiness Sans Title', file: '../lib/fonts/Happiness-Sans-Title.woff2' },
      { name: '해피니스 산스 VF', file: '../lib/fonts/HappinessSansVF.woff2' },
      { name: 'Happiness Sans VF', file: '../lib/fonts/HappinessSansVF.woff2' },

      { name: '카페24 슈퍼매직', file: '../lib/fonts/Cafe24Supermagic-Regular-v1.0.woff2' },
      { name: 'Cafe24 Supermagic', file: '../lib/fonts/Cafe24Supermagic-Regular-v1.0.woff2' },

      { name: '고운바탕', file: '../lib/fonts/GowunBatang-Bold.woff2', weight: 700 },
      { name: '고운돋움', file: '../lib/fonts/GowunDodum-Regular.woff2' },
    ];

    const applyFontOverrides = () => {
      const raw = new URLSearchParams(window.location.search).get('fontOverrides');
      if (!raw) return;

      const overrides = new Map(
        raw
          .split('|')
          .map((entry) => entry.split('='))
          .filter(([name, file]) => name && file)
          .map(([name, file]) => [decodeURIComponent(name), decodeURIComponent(file)]),
      );
      if (!overrides.size) return;

      for (const font of fonts) {
        const overrideFile = overrides.get(font.name);
        if (overrideFile) {
          font.file = overrideFile;
          const lower = overrideFile.toLowerCase();
          font.format = lower.endsWith('.woff')
            ? 'woff'
            : lower.endsWith('.ttf') ? 'truetype' : 'woff2';
        }
      }
      console.log(`[폰트] QA 오버라이드 ${overrides.size}개 적용`);
    };

    applyFontOverrides();

    // 1) CSS @font-face 규칙 생성 (Canvas 2D 호환 — CDN 폰트는 로컬 폴백 포함)
    const style = document.createElement('style');
    style.textContent = fonts.map(f => {
      const fmt = f.format || 'woff2';
      const weightProp = f.weight ? ` font-weight: ${f.weight};` : '';
      const styleProp = f.style ? ` font-style: ${f.style};` : '';
      let src = `url("${f.file}") format("${fmt}")`;
      if (f.localFallback) {
        const lfmt = f.localFallback.format || 'woff2';
        src += `, url("${f.localFallback.file}") format("${lfmt}")`;
      }
      return `@font-face { font-family: "${f.name}"; src: ${src};${weightProp}${styleProp} font-display: block; }`;
    }).join('\n');
    document.head.appendChild(style);

    // 2) FontFace API로 폰트 데이터를 즉시 로드 (네트워크 요청 트리거)
    // CDN 폰트가 차단·실패할 경우 로컬 폴백으로 자동 재시도한다.
    let loadedCount = 0, failedCount = 0;
    function _loadFontFace(name, src, descriptors) {
      const face = new FontFace(name, src, descriptors);
      return face.load().then(lf => { document.fonts.add(lf); loadedCount++; return lf; });
    }
    globalThis._fontLoadPromise = Promise.all(fonts.map(f => {
      const fmt = f.format || 'woff2';
      const descriptors = {};
      if (f.weight) descriptors.weight = String(f.weight);
      if (f.style) descriptors.style = f.style;
      // CDN 폰트는 로컬 폴백을 포함하는 src 목록으로 한 번에 로드
      const src = f.localFallback
        ? `url(${f.file}) format('${fmt}'), url(${f.localFallback.file}) format('${f.localFallback.format || 'woff2'}')`
        : `url(${f.file}) format('${fmt}')`;
      return _loadFontFace(f.name, src, descriptors).catch(() => {
        failedCount++;
        return null;
      });
    })).then(async () => {
      await document.fonts.ready;
      console.log(`[폰트] ${loadedCount}개 로드 완료, ${failedCount}개 실패`);
    });
  })();

  // ── measureTextWidth LRU 캐시 (WASM용) ─────────────────────────────────────
  // hwp-wasm-renderer.js와 중복 방지: 여기서 먼저 정의하면 모듈 로드 전에도 동작
  (function() {
    if (typeof globalThis.measureTextWidth !== 'undefined') return;
    let ctx = null, lastFont = '';
    const cache = new Map();
    const MAX = 2048, EVICT = 400;
    globalThis.measureTextWidth = function(font, text) {
      const key = font + '\0' + text;
      if (cache.has(key)) {
        const v = cache.get(key); cache.delete(key); cache.set(key, v); return v;
      }
      if (!ctx) ctx = document.createElement('canvas').getContext('2d');
      const resolvedFont = globalThis.FontSubstitution?.substituteCssFont
        ? globalThis.FontSubstitution.substituteCssFont(font, 0, 0)
        : font;
      if (resolvedFont !== lastFont) { ctx.font = resolvedFont; lastFont = resolvedFont; }
      const w = ctx.measureText(text).width;
      if (cache.size >= MAX) {
        const iter = cache.keys();
        for (let i = 0; i < EVICT; i++) { const k = iter.next().value; if (k) cache.delete(k); }
      }
      cache.set(key, w);
      return w;
    };
  })();

        <span class="tb-label">저장</span>
      </button>
      <button id="btnPrint" class="tb-btn" title="인쇄" disabled>
        <span class="tb-sprite icon-print"></span>
        <span class="tb-label">인쇄</span>
      </button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group">
      <button id="btnEditMode" class="tb-btn" title="편집 모드" disabled>
        <span class="tb-icon-text">편</span>
        <span class="tb-label">편집<br />모드</span>
      </button>
      <button id="btnViewMode" class="tb-btn" title="보기 모드" style="display:none">
        <span class="tb-icon-text">보</span>
        <span class="tb-label">보기<br />모드</span>
      </button>
    </div>
    <span class="tb-sep"></span>
    <div class="tb-group export-group" id="exportGroup" style="display:none">
      <select id="saveAsFormat" class="save-format-select" aria-label="다른 이름으로 저장 형식">
        <option value="hwpx">HWPX</option>
        <option value="owpml">OWPML</option>
        <option value="html">HTML</option>
        <option value="pdf">PDF</option>
        <option value="hwp">HWP</option>
      </select>
      <button id="btnSaveAs" class="tb-btn" title="다른 이름으로 저장" disabled>
        <span class="tb-icon-text">다</span>
        <span class="tb-label">다른 이름<br />저장</span>
      </button>
    </div>
    <span class="tb-spacer"></span>
    <div class="tb-docinfo">
      <span class="app-badge">HWP</span>
      <span class="app-title">문서 편집기</span>
      <span class="file-name" id="fileName">파일을 업로드하세요</span>
    </div>
    <input type="file" id="fileInput" accept=".hwp,.hwpx,.owpml" style="display:none" />
  </div>

  <div id="style-bar">
    <select class="sb-combo" title="스타일" disabled>
      <option>본문</option>
    </select>
    <select class="sb-combo sb-font-lang" title="언어" disabled>
      <option>한글</option>
    </select>
    <select class="sb-combo sb-font" title="글꼴" disabled>
      <option>함초롬바탕</option>
    </select>
    <span class="sb-size-group">
      <input type="text" class="sb-size" value="10.0" title="글자 크기" disabled />
      <span class="sb-size-unit">pt</span>
      <span class="sb-size-arrows">
        <button class="sb-arrow" type="button" disabled>▲</button>
        <button class="sb-arrow" type="button" disabled>▼</button>
      </span>
    </span>
    <span class="sb-sep"></span>
    <button class="sb-btn" type="button" disabled><span class="sb-ga sb-bold">가</span></button>
    <button class="sb-btn" type="button" disabled><span class="sb-ga sb-italic">가</span></button>
    <button class="sb-btn" type="button" disabled><span class="sb-ga sb-underline">간</span></button>
    <span class="sb-sep"></span>
    <button class="sb-btn" type="button" disabled><span class="sb-align sb-al-left"></span></button>
    <button class="sb-btn" type="button" disabled><span class="sb-align sb-al-center"></span></button>
    <button class="sb-btn" type="button" disabled><span class="sb-align sb-al-right"></span></button>
    <button class="sb-btn" type="button" disabled><span class="sb-align sb-al-justify"></span></button>
    <span class="tb-spacer"></span>
    <div class="wasm-toolbar hidden" id="wasmToolbar">
      <div class="wasm-toolbar-group">
        <button class="wasm-tb-btn" id="btnZoomOut" title="축소 (Ctrl+-)">&#8722;</button>
        <span class="wasm-zoom-level" id="zoomLevel">100%</span>
        <button class="wasm-tb-btn" id="btnZoomIn" title="확대 (Ctrl++)">&#43;</button>
        <button class="wasm-tb-btn" id="btnZoomFit" title="페이지 너비에 맞춤">폭 맞춤</button>
      </div>
      <div class="wasm-toolbar-group wasm-search-group">
        <input type="text" class="wasm-search-input" id="wasmSearchInput" placeholder="검색 (Ctrl+F)" />
        <button class="wasm-tb-btn" id="btnSearchPrev" disabled title="이전 결과">&#9650;</button>
        <button class="wasm-tb-btn" id="btnSearchNext" disabled title="다음 결과">&#9660;</button>
        <span class="wasm-search-info hidden" id="wasmSearchInfo">0 / 0</span>
        <button class="wasm-tb-btn wasm-search-clear hidden" id="btnSearchClear" title="검색 초기화">&#10005;</button>
      </div>
    </div>
  </div>

  <div class="workspace-shell">
    <div class="error-banner" id="errorBanner" style="display:none">
      <span id="errorMsg"></span>
      <button class="close-btn" id="btnCloseError">✕</button>
    </div>

    <main class="main-content" id="mainContent" style="display:none">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">문서 탐색</div>
        <div class="page-thumbnails" id="pageThumbnails"></div>
        <section class="qa-audit-panel" id="qaAuditPanel" style="display:none">
          <div class="sidebar-title">레이아웃 감사</div>
          <div class="qa-audit-summary" id="qaAuditSummary"></div>
          <div class="qa-audit-current" id="qaCurrentPageAudit"></div>
          <div class="qa-audit-list" id="qaHotspotList"></div>
        </section>
      </aside>

      <section class="workspace-main">
        <div id="editor-area">
          <div id="ruler-corner"></div>
          <canvas id="h-ruler" width="1200" height="20" aria-hidden="true"></canvas>
          <canvas id="v-ruler" width="20" height="1200" aria-hidden="true"></canvas>

          <section class="viewer-panel" id="viewerPanel">
            <div class="document-canvas" id="documentCanvas">
              <div class="wasm-edit-caret" id="wasmCaret" aria-hidden="true"></div>
              <textarea
                id="wasmImeInput"
                class="wasm-ime-input"
                rows="1"
                spellcheck="false"
                autocapitalize="off"
                autocomplete="off"
                autocorrect="off"
                aria-hidden="true"
              ></textarea>
            </div>
          </section>

          <section class="editor-panel" id="editorPanel" style="display:none">
            <div class="editor-toolbar-info">
              편집 모드: 아래 에디터에서 내용을 수정한 뒤 저장하거나 다른 이름으로 저장할 수 있습니다.
            </div>
            <div id="quillEditor"></div>
          </section>
        </div>
      </section>
    </main>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-inner">
        <div class="drop-icon">HWP</div>
        <p class="drop-title">HWP / HWPX / OWPML 문서를 이곳에 끌어다 놓으시옵소서</p>
        <p class="drop-sub">또는 <button class="link-btn" id="btnDropOpen">파일 선택</button></p>
        <p class="drop-note">지원 형식: .hwp (HWP 5.0+), .hwpx, .owpml</p>
      </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display:none">
      <div class="spinner"></div>
      <p id="loadingMsg">처리 중...</p>
    </div>
  </div>

  <footer class="status-bar" id="statusBar" style="display:none">
    <div class="status-left">
      <span id="statusPageInfo" class="stb-item">1 / 1 쪽</span>
      <span class="stb-divider"></span>
      <span id="statusSectionInfo" class="stb-item">구역: 1 / 1</span>
      <span class="stb-divider"></span>
      <span id="statusMode" class="stb-item">읽기</span>
      <span id="statusFieldInfo" class="stb-item" style="display:none"></span>
      <span id="statusMessage" class="stb-message"></span>
    </div>
    <div class="status-right">
      <button id="sb-zoom-fit-width" class="stb-icon-btn" title="폭 맞춤">
        <span class="tb-sprite icon-zoom-fit-width"></span>
      </button>
      <button id="sb-zoom-fit" class="stb-icon-btn" title="쪽 맞춤">
        <span class="tb-sprite icon-zoom-fit"></span>
      </button>
      <span class="stb-divider"></span>
      <span id="sb-zoom-val" class="stb-zoom-val">100%</span>
      <button id="sb-zoom-out" class="stb-icon-btn" title="축소">
        <span class="tb-sprite icon-zoom-out"></span>
      </button>
      <button id="sb-zoom-in" class="stb-icon-btn" title="확대">
        <span class="tb-sprite icon-zoom-in"></span>
      </button>
    </div>
  </footer>
</div>

<script src="../lib/quill.min.js"></script>
<script src="../lib/jszip.min.js"></script>
<script src="../lib/pako.min.js"></script>
<!-- 폰트 치환 모듈 (전역 FontSubstitution 객체 등록) -->
<script src="../js/font_substitution.js"></script>
<!-- HWP 엔진 WASM 렌더러 (ES module) — app.js보다 먼저 선언, 초기화는 비동기 -->
<script type="module" src="../js/hwp-wasm-renderer.js"></script>
<script src="../js/hwp-parser.js"></script>
<script src="../js/hwp-renderer.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
