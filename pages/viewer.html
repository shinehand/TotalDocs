<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HWP Web Viewer &amp; Editor</title>

  <!-- Quill WYSIWYG Editor (로컬 복사본 — MV3 CSP가 외부 CDN 차단) -->
  <link href="../lib/quill.snow.css" rel="stylesheet" />

  <!-- 로컬 스타일시트 -->
  <link rel="stylesheet" href="../css/viewer.css" />
  <link rel="stylesheet" href="../css/editor.css" />
</head>
<body>

<!-- ───────────── 헤더 툴바 ───────────── -->
<header class="app-header">
  <div class="header-left">
    <span class="app-logo">📄</span>
    <span class="app-title">HWP Web Viewer &amp; Editor</span>
    <span class="file-name" id="fileName">파일을 업로드하세요</span>
  </div>
  <div class="header-right">
    <button id="btnOpenFile"   class="btn btn-primary">📂 파일 열기</button>
    <button id="btnEditMode"   class="btn btn-secondary" disabled>✏️ 편집 모드</button>
    <button id="btnViewMode"   class="btn btn-secondary" disabled hidden>👁️ 보기 모드</button>
    <div class="export-group" id="exportGroup" hidden>
      <button id="btnExportHTML" class="btn btn-export">⬇️ HTML 저장</button>
      <button id="btnExportPDF"  class="btn btn-export">⬇️ PDF 저장</button>
      <button id="btnExportHWPX" class="btn btn-export">⬇️ HWPX 저장</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".hwp,.hwpx" hidden />
</header>

<!-- ───────────── 드래그&드롭 업로드 존 ───────────── -->
<div class="drop-zone" id="dropZone">
  <div class="drop-zone-inner">
    <div class="drop-icon">📂</div>
    <p class="drop-title">HWP / HWPX 파일을 여기에 끌어다 놓으세요</p>
    <p class="drop-sub">또는 <button class="link-btn" id="btnDropOpen">파일 선택</button></p>
    <p class="drop-note">지원 형식: .hwp (HWP 5.0+), .hwpx</p>
  </div>
</div>

<!-- ───────────── 로딩 오버레이 ───────────── -->
<div class="loading-overlay" id="loadingOverlay" hidden>
  <div class="spinner"></div>
  <p id="loadingMsg">파일을 파싱하는 중입니다...</p>
</div>

<!-- ───────────── 오류 배너 ───────────── -->
<div class="error-banner" id="errorBanner" hidden>
  <span id="errorMsg"></span>
  <button class="close-btn" id="btnCloseError">✕</button>
</div>

<!-- ───────────── 메인 콘텐츠 영역 ───────────── -->
<main class="main-content" id="mainContent" hidden>

  <!-- 페이지 탐색 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">페이지</div>
    <div class="page-thumbnails" id="pageThumbnails"></div>
  </aside>

  <!-- 뷰어 패널 -->
  <section class="viewer-panel" id="viewerPanel">
    <div class="document-canvas" id="documentCanvas">
      <!-- hwp.js 렌더링 결과가 여기에 삽입됩니다 -->
    </div>
  </section>

  <!-- 편집기 패널 (숨김 상태로 시작) -->
  <section class="editor-panel" id="editorPanel" hidden>
    <div class="editor-toolbar-info">
      ℹ️ 편집 모드: 아래 에디터에서 텍스트와 서식을 수정한 뒤 내보내기하세요.
    </div>
    <div id="quillEditor"></div>
  </section>

</main>

<!-- ───────────── 상태바 ───────────── -->
<footer class="status-bar" id="statusBar" hidden>
  <span id="statusPageInfo">1 / 1 페이지</span>
  <span id="statusFileInfo"></span>
  <span id="statusMode" class="mode-badge view">보기 모드</span>
</footer>

<!-- ───────────── 라이브러리 로드 ───────────── -->
<!--
  hwp.js: HWP 5.0 파일 파싱 라이브러리 (CFB 컨테이너 + HWP 레코드 파싱)
  GitHub: https://github.com/hahnlee/hwp.js
  CDN 미지원 → 번들러 없이 사용하려면 로컬 빌드 필요.
  여기서는 파싱 로직을 hwp-parser.js 내에서 직접 구현(폴리필 방식)합니다.
-->
<script src="../lib/quill.min.js"></script>
<script src="../lib/jszip.min.js"></script>
<script type="module" src="../js/viewer.js"></script>

</body>
</html>
